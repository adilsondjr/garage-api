services:
  proxy:
    image: nginx:alpine
    container_name: garage-proxy
    ports:
      - "3003:3003"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - garage-network
    depends_on:
      - app
  mysql:
    image: mysql:8.0
    container_name: garage-mysql
    environment:
      MYSQL_DATABASE: garage
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - garage-network

  simulator:
    image: cfontes0estapar/garage-sim:1.0.0
    container_name: garage-simulator
    ports:
      - "3000:3000"
    environment:
      WEBHOOK_URL: http://app:8080/webhook
    networks:
      - garage-network

  app:
    image: garage-app-spring-boot
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garage-app-spring-boot
    ports:
      - "8080:8080"
    environment:
      DB_USER: root
      DB_PASSWORD: password
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/garage?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    depends_on:
      mysql:
        condition: service_healthy
      simulator:
        condition: service_started
    networks:
      - garage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/garage/occupancy 2>/dev/null | grep -q total || exit 1"]
      timeout: 10s
      retries: 5
      interval: 10s
      start_period: 45s

networks:
  garage-network:
    driver: bridge

volumes:
  mysql_data:
